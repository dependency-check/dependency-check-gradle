name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        jdk_default_version: [ '17' ]                # Single JDK version to run Gradle with and use for compilation etc
        jdk_test_version: [ '11', '17', '21', '25' ] # JDK version to run tests using
      fail-fast: false

    name: Build and Test (JDK ${{ matrix.jdk_test_version }}${{ matrix.jdk_test_version == matrix.jdk_default_version && ' - Default' || '' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDKs
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: | # last version takes precedence as default
            ${{ matrix.jdk_test_version }}
            ${{ matrix.jdk_default_version }}
          distribution: 'zulu'
          check-latest: true
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Build
        run: >
          ./gradlew build
          -PtestToolchainVersion=${{ matrix.jdk_test_version }}
          ${{ matrix.jdk_test_version == matrix.jdk_default_version && 'publishToMavenLocal' || '' }}
      - name: Problems Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: problems-report-${{ matrix.jdk_test_version }}
          retention-days: 7
          path: build/reports/problems/problems-report.html
          if-no-files-found: ignore
      - name: Archive Test Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: it-test-logs-${{ matrix.jdk_test_version }}
          retention-days: 7
          path: build/reports/tests/test